name: PickaxeLoans
version: '${version}'

main: io.github.ethan23.pickaxeLoans.PickaxeLoans
api-version: '1.21.11'
load: POSTWORLD

commands:
  loan:
    aliases: [loans]
    description: handles pickaxe loan system
    permission: cosmicprisons.loan
permissions:
  cosmicprisons.loan:
    description: Allows use of /loan command
    default: true

libraries:
  - org.xerial:sqlite-jdbc:3.53.2.0